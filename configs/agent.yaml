agent:
  name: Sunday
  workspace_dir: .sunday/workspace
  sessions_dir: .sunday/sessions

# Anthropic
# model:
#   provider: anthropic  # anthropic | openai | google | ollama
#   id: claude-opus-4-5
#   temperature: 0.2
#   max_tokens: 8192
#   base_url: null        # OpenAI 兼容模型填写自定义端点 URL，Anthropic/Google 留 null
#   api_key_env: null     # 指定 .env 中的变量名（如 DEEPSEEK_API_KEY），null 则按 provider 自动查找

# ── OpenAI 兼容模型示例（取消注释并替换当前 model 块即可切换）──────────────────
#
# DeepSeek
model:
  provider: openai
  id: deepseek-chat
  temperature: 0.2
  max_tokens: 8192
  base_url: https://api.deepseek.com/v1
  api_key_env: DEEPSEEK_API_KEY
#
# Qwen（阿里云 DashScope）
# model:
#   provider: openai
#   id: qwen-max
#   temperature: 0.2
#   max_tokens: 8192
#   base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
#   api_key_env: QWEN_API_KEY
#
# Moonshot
# model:
#   provider: openai
#   id: moonshot-v1-8k
#   temperature: 0.2
#   max_tokens: 8192
#   base_url: https://api.moonshot.cn/v1
#   api_key_env: MOONSHOT_API_KEY
#
# Ollama（本地，无需 key）
# model:
#   provider: openai
#   id: llama3.2
#   temperature: 0.2
#   max_tokens: 8192
#   base_url: http://localhost:11434/v1
#   api_key_env: null

reasoning:
  max_steps: 10
  thinking_level: medium  # off | minimal | low | medium | high
  thinking_budget_tokens: 4096

memory:
  consolidation_cron: "0 4 * * *"
  log_retention_days: 30
  l0_max_lines: 100

tools:
  default_timeout: 30
  max_output_chars: 4096
  sandbox_mode: true
  allow_list: []
  deny_list:
    - "rm -rf"
    - "dd if="

mcp:
  servers: []

skills:
  extra_dirs: []

tasks:
  daily_brief:
    description: "每日简报：汇总今日未读邮件摘要、当天日历事件、待处理事项"
    steps:
      - "列出今天的未读邮件（最多 10 封），提取主题和发件人"
      - "读取今天的日历事件"
      - "生成简洁的日报摘要，包含邮件要点和日程安排"
      - "将简报写入 workspace/memory/ 今日日志"
